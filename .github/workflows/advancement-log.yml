name: Advancement Log

on:
  push:

permissions:
  contents: write

jobs:
  generate-advancement-log:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate Advancement File
        run: |
          python scripts/generate_advancement_log.py \
            --before "${{ github.event.before }}" \
            --after "${{ github.sha }}" \
            --branch "${{ github.ref_name }}"

      - name: Commit And Push Advancement File
        run: |
          if [[ -n "$(git status --porcelain advancement)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add advancement
            git commit -m "chore(advancement): auto-log push ${{ github.sha }}"
            git push
          else
            echo "No advancement changes detected."
          fi

