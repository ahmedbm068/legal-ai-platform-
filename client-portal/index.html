<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#183346" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Client Portal" />
    <title>Client Intake Portal</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/app-icon.svg" />
    <link rel="apple-touch-icon" href="/app-icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        corePlugins: { preflight: false },
        theme: {
          extend: {
            colors: {
              "error-container": "#ffdad6",
              "surface-container-highest": "#e4e2dd",
              "error": "#ba1a1a",
              "outline-variant": "#c4c6cf",
              "on-surface": "#1b1c19",
              "surface": "#fbf9f4",
              "inverse-on-surface": "#f2f1ec",
              "on-secondary": "#ffffff",
              "surface-container-low": "#f5f3ee",
              "surface-container-high": "#eae8e3",
              "on-primary": "#ffffff",
              "primary": "#000000",
              "on-background": "#1b1c19",
              "secondary": "#4d6453",
              "background": "#fbf9f4",
              "outline": "#74777f",
              "surface-container": "#f0eee9",
              "secondary-container": "#cde6d1",
              "surface-variant": "#e4e2dd",
              "on-surface-variant": "#44474e",
              "surface-container-lowest": "#ffffff",
              "primary-container": "#001b3d"
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem"
            },
            spacing: {
              gutter: "24px",
              "container-max": "1120px",
              "stack-lg": "48px",
              "stack-sm": "12px",
              unit: "8px",
              "stack-md": "24px"
            },
            fontFamily: {
              "body-md": ["Inter"],
              "label-md": ["Inter"],
              "display-lg": ["Playfair Display"],
              "headline-md": ["Playfair Display"],
              "body-lg": ["Inter"],
              "headline-lg": ["Playfair Display"]
            },
            fontSize: {
              "body-md": ["16px", { lineHeight: "1.5", fontWeight: "400" }],
              "label-md": ["14px", { lineHeight: "1.2", letterSpacing: "0.05em", fontWeight: "500" }],
              "display-lg": ["48px", { lineHeight: "1.2", letterSpacing: "-0.02em", fontWeight: "700" }],
              "headline-md": ["24px", { lineHeight: "1.4", fontWeight: "600" }],
              "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
              "headline-lg": ["32px", { lineHeight: "1.3", fontWeight: "600" }]
            }
          }
        }
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      }
      .lexington-scope {
        font-family: "Inter", sans-serif;
        background-color: #fbf9f4;
      }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
  </html>
