<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050" role="img" aria-labelledby="title desc">
  <title id="title">Legal AI Platform Final Master Plan Architecture</title>
  <desc id="desc">Defense-ready architecture diagram based on the May 5 to July 5 adjusted master plan, showing phases, frontends, FastAPI backend, copilot orchestrator, big agents, trust and evaluation layers, data stores, and jury deliverables.</desc>
  <defs>
    <linearGradient id="deepBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1258d6"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="softBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eaf4ff"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="softGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eafbf1"/>
      <stop offset="1" stop-color="#d9f7dd"/>
    </linearGradient>1
    <linearGradient id="softAmber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7e6"/>
      <stop offset="1" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="softRose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff1f2"/>
      <stop offset="1" stop-color="#ffe4e6"/>
    </linearGradient>
    <linearGradient id="softViolet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4efff"/>
      <stop offset="1" stop-color="#e9ddff"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-15%" width="125%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1d4ed8"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#15803d"/>
    </marker>
    <marker id="arrowSlate" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .canvas { fill: #f8fbff; }
      .h1 { font: 800 31px Arial, sans-serif; fill: #102a5c; }
      .h2 { font: 800 18px Arial, sans-serif; fill: #102a5c; }
      .h3 { font: 800 15px Arial, sans-serif; fill: #172554; }
      .body { font: 500 13px Arial, sans-serif; fill: #334155; }
      .small { font: 500 11px Arial, sans-serif; fill: #475569; }
      .tiny { font: 500 10px Arial, sans-serif; fill: #64748b; }
      .whiteTitle { font: 800 22px Arial, sans-serif; fill: #ffffff; }
      .whiteBody { font: 600 12px Arial, sans-serif; fill: #edf5ff; }
      .phaseTitle { font: 800 16px Arial, sans-serif; fill: #0f172a; }
      .phaseMeta { font: 700 11px Arial, sans-serif; fill: #334155; }
      .badgeText { font: 800 10px Arial, sans-serif; fill: #ffffff; }
      .box { stroke: #9eb8dc; stroke-width: 1.4; filter: url(#shadow); }
      .boxPlain { stroke: #b7c8de; stroke-width: 1.2; }
      .node { fill: #ffffff; stroke: #bfcede; stroke-width: 1.15; }
      .pillBlue { fill: url(#deepBlue); }
      .arrowBlue { stroke: #1d4ed8; stroke-width: 3; fill: none; marker-end: url(#arrowBlue); }
      .arrowGreen { stroke: #15803d; stroke-width: 3; fill: none; marker-end: url(#arrowGreen); }
      .arrowSlate { stroke: #64748b; stroke-width: 2.25; fill: none; marker-end: url(#arrowSlate); }
      .dash { stroke-dasharray: 8 7; }
      .line { stroke: #cbd5e1; stroke-width: 1.3; }
    </style>
  </defs>

  <rect class="canvas" width="1600" height="1050"/>

  <text class="h1" x="48" y="48">Legal AI Platform - Defense-Ready Master Architecture</text>
  <text class="body" x="48" y="75">Based on the adjusted master plan: May 5 -> July 5, 2026. Goal: a product the jury can test, measure, audit, and understand.</text>
  <rect x="1238" y="28" width="304" height="42" rx="21" fill="#e0f2fe" stroke="#7dd3fc"/>
  <text class="h3" x="1262" y="54">Target: v1.0-defense by July 5</text>

  <!-- Phase map -->
  <rect class="box" x="48" y="106" width="1504" height="150" rx="18" fill="#ffffff"/>
  <text class="h2" x="78" y="138">Roadmap Layer</text>
  <text class="small" x="210" y="137">4 phases, hard exit criteria, numbers/screens/docs for every jury question</text>

  <rect class="boxPlain" x="78" y="162" width="332" height="70" rx="13" fill="url(#softGreen)"/>
  <text class="phaseTitle" x="98" y="187">A. Core Compressed</text>
  <text class="phaseMeta" x="98" y="207">May 5 -> May 17 | 30-40h</text>
  <text class="small" x="98" y="225">Big Agents, verifier, traces, workspace, RAG, voice</text>
  <rect x="344" y="174" width="44" height="21" rx="10.5" fill="#16a34a"/>
  <text class="badgeText" x="355" y="189">DONE</text>

  <rect class="boxPlain" x="430" y="162" width="332" height="70" rx="13" fill="url(#softBlue)"/>
  <text class="phaseTitle" x="450" y="187">B. Excellence Layer</text>
  <text class="phaseMeta" x="450" y="207">May 18 -> June 7 | 50-70h</text>
  <text class="small" x="450" y="225">eval harness, metrics, security, UX hardening</text>

  <rect class="boxPlain" x="782" y="162" width="332" height="70" rx="13" fill="url(#softViolet)"/>
  <text class="phaseTitle" x="802" y="187">C. Wow Differentiation</text>
  <text class="phaseMeta" x="802" y="207">June 8 -> June 21 | 40-55h</text>
  <text class="small" x="802" y="225">proof-first verifier, voice timeline, drafting, reranker</text>

  <rect class="boxPlain" x="1134" y="162" width="388" height="70" rx="13" fill="url(#softAmber)"/>
  <text class="phaseTitle" x="1154" y="187">D. Polish + Defense</text>
  <text class="phaseMeta" x="1154" y="207">June 22 -> July 5 | 30-40h</text>
  <text class="small" x="1154" y="225">demo tenant, report, slides, screencasts, final tag</text>

  <path class="arrowSlate" d="M410 197 L426 197"/>
  <path class="arrowSlate" d="M762 197 L778 197"/>
  <path class="arrowSlate" d="M1114 197 L1130 197"/>

  <!-- User/frontends -->
  <rect class="box" x="48" y="302" width="228" height="272" rx="16" fill="#ffffff"/>
  <text class="h2" x="82" y="335">Entry Points</text>
  <rect class="boxPlain" x="78" y="360" width="168" height="50" rx="11" fill="url(#deepBlue)"/>
  <text class="whiteBody" x="118" y="382">Lawyer UI</text>
  <text class="whiteBody" x="103" y="399">case workspace</text>
  <rect class="boxPlain" x="78" y="425" width="168" height="50" rx="11" fill="url(#softGreen)"/>
  <text class="h3" x="113" y="446">Client Portal</text>
  <text class="small" x="102" y="462">intake + documents</text>
  <rect class="boxPlain" x="78" y="490" width="168" height="50" rx="11" fill="url(#softViolet)"/>
  <text class="h3" x="119" y="511">Admin App</text>
  <text class="small" x="97" y="527">audit + trace + health</text>

  <rect class="box" x="48" y="612" width="228" height="300" rx="16" fill="#ffffff"/>
  <text class="h2" x="104" y="645">Inputs</text>
  <rect class="node" x="78" y="670" width="78" height="58" rx="10"/>
  <text class="h3" x="105" y="695">PDF</text>
  <text class="small" x="91" y="713">contracts</text>
  <rect class="node" x="168" y="670" width="78" height="58" rx="10"/>
  <text class="h3" x="198" y="695">OCR</text>
  <text class="small" x="181" y="713">scans</text>
  <rect class="node" x="78" y="744" width="78" height="58" rx="10"/>
  <text class="h3" x="100" y="769">Voice</text>
  <text class="small" x="91" y="787">calls</text>
  <rect class="node" x="168" y="744" width="78" height="58" rx="10"/>
  <text class="h3" x="195" y="769">Case</text>
  <text class="small" x="185" y="787">events</text>
  <rect class="node" x="78" y="818" width="168" height="58" rx="10"/>
  <text class="h3" x="109" y="843">Legal Corpus</text>
  <text class="small" x="98" y="861">optional EUR-Lex subset</text>

  <!-- Backend gateway -->
  <rect class="box" x="330" y="302" width="392" height="112" rx="16" fill="url(#deepBlue)"/>
  <text class="whiteTitle" x="438" y="340">FastAPI Backend</text>
  <text class="whiteBody" x="384" y="366">backend/main.py routes the product domains</text>
  <text class="whiteBody" x="370" y="390">auth | cases | assistant | ai | docs | admin | portal</text>
  <path class="arrowBlue" d="M276 386 C300 386 302 358 326 358"/>
  <path class="arrowSlate" d="M276 770 C302 770 300 404 326 392"/>

  <!-- Orchestrator -->
  <rect class="box" x="330" y="466" width="392" height="292" rx="18" fill="url(#softBlue)"/>
  <text class="h2" x="428" y="501">Copilot Orchestrator</text>
  <text class="body" x="405" y="524">single AI control plane for legal assistance</text>
  <rect x="372" y="548" width="308" height="32" rx="16" fill="url(#deepBlue)"/>
  <text class="whiteBody" x="462" y="568">intent + mode routing</text>
  <rect x="372" y="592" width="308" height="32" rx="16" fill="url(#deepBlue)"/>
  <text class="whiteBody" x="425" y="612">matter classification + workflow plan</text>
  <rect x="372" y="636" width="308" height="32" rx="16" fill="url(#deepBlue)"/>
  <text class="whiteBody" x="430" y="656">big agent + mini-agent selection</text>
  <rect x="372" y="680" width="308" height="32" rx="16" fill="url(#deepBlue)"/>
  <text class="whiteBody" x="430" y="700">response assembly + metadata</text>
  <text class="small" x="398" y="737">Main response path stays alive even if trace logging fails.</text>
  <path class="arrowBlue" d="M526 414 L526 462"/>

  <!-- Big agents -->
  <rect class="box" x="784" y="302" width="336" height="296" rx="18" fill="url(#softViolet)"/>
  <text class="h2" x="887" y="335">Big Agents</text>
  <text class="body" x="842" y="359">surfaced specialist layer from existing services</text>
  <rect x="1020" y="316" width="58" height="22" rx="11" fill="#16a34a"/>
  <text class="badgeText" x="1032" y="331">A0</text>

  <rect class="node" x="812" y="385" width="130" height="54" rx="10"/>
  <text class="h3" x="846" y="407">Research</text>
  <text class="small" x="827" y="425">search + high reasoning</text>
  <rect class="node" x="958" y="385" width="134" height="54" rx="10"/>
  <text class="h3" x="992" y="407">Drafting</text>
  <text class="small" x="977" y="425">drafts + citations</text>
  <rect class="node" x="812" y="456" width="130" height="54" rx="10"/>
  <text class="h3" x="851" y="478">Review</text>
  <text class="small" x="836" y="496">review table v2</text>
  <rect class="node" x="958" y="456" width="134" height="54" rx="10"/>
  <text class="h3" x="994" y="478">Workflow</text>
  <text class="small" x="976" y="496">IRAC + blueprints</text>
  <rect class="node" x="884" y="527" width="136" height="54" rx="10"/>
  <text class="h3" x="918" y="549">Workspace</text>
  <text class="small" x="905" y="567">case memory/state</text>
  <path class="arrowBlue" d="M722 612 C752 612 750 450 780 450"/>

  <!-- Mini agents -->
  <rect class="box" x="784" y="636" width="336" height="276" rx="18" fill="#ffffff"/>
  <text class="h2" x="870" y="670">Mini-Agent Pipeline</text>
  <rect class="node" x="812" y="695" width="130" height="42" rx="9" fill="#eef7ff"/>
  <text class="small" x="852" y="721">retrieval</text>
  <rect class="node" x="958" y="695" width="134" height="42" rx="9" fill="#eef7ff"/>
  <text class="small" x="990" y="721">legal search</text>
  <rect class="node" x="812" y="751" width="130" height="42" rx="9" fill="#eef7ff"/>
  <text class="small" x="846" y="777">reasoning</text>
  <rect class="node" x="958" y="751" width="134" height="42" rx="9" fill="#eef7ff"/>
  <text class="small" x="995" y="777">drafting</text>
  <rect class="node" x="812" y="807" width="130" height="42" rx="9" fill="#eef7ff"/>
  <text class="small" x="850" y="833">composer</text>
  <rect class="node" x="958" y="807" width="134" height="42" rx="9" fill="#fee2e2"/>
  <text class="small" x="999" y="833">verifier</text>
  <rect class="node" x="884" y="862" width="136" height="34" rx="9" fill="#f8fafc"/>
  <text class="tiny" x="905" y="883">ordered trace stages</text>
  <path class="arrowSlate" d="M952 598 L952 632"/>

  <!-- Excellence / trust -->
  <rect class="box" x="1182" y="302" width="370" height="296" rx="18" fill="url(#softAmber)"/>
  <text class="h2" x="1278" y="335">Trust + Excellence</text>
  <text class="body" x="1224" y="359">what makes the AI defensible, measurable, and safe</text>

  <rect class="node" x="1212" y="385" width="146" height="58" rx="10"/>
  <text class="h3" x="1249" y="408">Verifier</text>
  <text class="small" x="1228" y="426">grounded / partial / refused</text>
  <rect class="node" x="1374" y="385" width="146" height="58" rx="10"/>
  <text class="h3" x="1415" y="408">Evals</text>
  <text class="small" x="1393" y="426">precision, refusal, cost</text>
  <rect class="node" x="1212" y="462" width="146" height="58" rx="10"/>
  <text class="h3" x="1237" y="485">Observability</text>
  <text class="small" x="1229" y="503">cost, latency, traces</text>
  <rect class="node" x="1374" y="462" width="146" height="58" rx="10"/>
  <text class="h3" x="1412" y="485">Security</text>
  <text class="small" x="1390" y="503">tenant scope + rate limit</text>
  <rect class="node" x="1292" y="537" width="146" height="42" rx="10" fill="#fff7ed"/>
  <text class="small" x="1312" y="562">prompt lock + CI gates</text>
  <path class="arrowGreen" d="M1120 468 C1148 468 1150 462 1178 462"/>
  <path class="arrowGreen" d="M1120 824 C1150 824 1150 500 1178 500"/>

  <!-- Data platform -->
  <rect class="box" x="330" y="812" width="392" height="172" rx="18" fill="#ffffff"/>
  <text class="h2" x="424" y="845">Data Platform</text>
  <rect class="node" x="358" y="868" width="103" height="42" rx="9" fill="#eef7ff"/>
  <text class="small" x="386" y="894">Postgres</text>
  <rect class="node" x="477" y="868" width="103" height="42" rx="9" fill="#eef7ff"/>
  <text class="small" x="511" y="894">MinIO</text>
  <rect class="node" x="596" y="868" width="98" height="42" rx="9" fill="#eef7ff"/>
  <text class="small" x="626" y="894">FAISS</text>
  <rect class="node" x="358" y="925" width="103" height="42" rx="9" fill="#fff7ed"/>
  <text class="small" x="381" y="951">LLM API</text>
  <rect class="node" x="477" y="925" width="103" height="42" rx="9" fill="#fff7ed"/>
  <text class="small" x="510" y="951">OCR</text>
  <rect class="node" x="596" y="925" width="98" height="42" rx="9" fill="#fff7ed"/>
  <text class="small" x="626" y="951">n8n</text>
  <path class="arrowSlate" d="M526 758 L526 808"/>

  <!-- Outputs -->
  <rect class="box" x="1182" y="636" width="370" height="276" rx="18" fill="url(#softGreen)"/>
  <text class="h2" x="1280" y="670">Final Product Outputs</text>
  <rect class="node" x="1212" y="695" width="146" height="54" rx="10"/>
  <text class="h3" x="1243" y="717">Answers</text>
  <text class="small" x="1231" y="735">verified citations</text>
  <rect class="node" x="1374" y="695" width="146" height="54" rx="10"/>
  <text class="h3" x="1403" y="717">Review Tables</text>
  <text class="small" x="1400" y="735">Vault-style case view</text>
  <rect class="node" x="1212" y="768" width="146" height="54" rx="10"/>
  <text class="h3" x="1244" y="790">Drafts</text>
  <text class="small" x="1228" y="808">letters + docx export</text>
  <rect class="node" x="1374" y="768" width="146" height="54" rx="10"/>
  <text class="h3" x="1402" y="790">Workflows</text>
  <text class="small" x="1395" y="808">case-aware previews</text>
  <rect class="node" x="1212" y="841" width="308" height="48" rx="10" fill="#ffffff"/>
  <text class="h3" x="1276" y="862">Defense Pack</text>
  <text class="small" x="1240" y="879">demo tenant, runbook, slides, report, screencasts, tag</text>
  <path class="arrowGreen" d="M1120 786 C1148 786 1150 762 1178 762"/>

  <!-- bottom KPI strip -->
  <rect class="box" x="48" y="942" width="228" height="42" rx="14" fill="#e0f2fe"/>
  <text class="h3" x="79" y="968">Current: 233 tests green</text>
  <rect class="box" x="784" y="942" width="336" height="42" rx="14" fill="#f0fdf4"/>
  <text class="h3" x="827" y="968">Phase B target: eval baseline + metrics</text>
  <rect class="box" x="1182" y="942" width="370" height="42" rx="14" fill="#fff7ed"/>
  <text class="h3" x="1226" y="968">Defense answer style: number, screen, or doc</text>
</svg>
