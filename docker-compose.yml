services:

  n8n:
    image: n8nio/n8n:latest
    container_name: legal_ai_n8n
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      LEGAL_AI_BACKEND_URL: ${LEGAL_AI_BACKEND_URL:-http://host.docker.internal:8000}
      N8N_WEBHOOK_SECRET: ${N8N_WEBHOOK_SECRET:-legal-ai-n8n-secret}
      GENERIC_TIMEZONE: UTC
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
    volumes:
      - n8n_data:/home/node/.n8n

  postgres:
    image: postgres:15
    container_name: legal_ai_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: legal_ai
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: legal_ai_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    container_name: legal_ai_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  n8n_data:
  postgres_data:
  redis_data:
  minio_data:
